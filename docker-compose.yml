services:
  rstudio2u:
    image: jmgirard/rstudio2u:latest
    build:
      context: .
      args:
        UBUNTU_VERSION: "24.04"
    ports:
      - "127.0.0.1:${RS_PORT:-8787}:8787"
    environment:
      - PASSWORD=${SUDO_PASS:-rstudio}
      - ROOT=true
      - DISABLE_AUTH=true
    volumes:
      # Persist the user's home directory (files, settings, installed R
      # packages) so work survives `docker compose down`, image updates, and
      # pruning. The named volume is pre-populated from the image on first run.
      - rstudio_home:/home/rstudio

volumes:
  rstudio_home:
